<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles/index.css" />
        <title>Mundo pet</title>
    </head>
    <body>
        <div class="logo">
            <img src="./assets/logo.svg" alt="Logo Mundo pet" />
        </div>
        <div id="app">
            <header>
                <div>
                    <h1>Sua agenda</h1>
                    <p>Aqui você pode ver todos os clientes e serviços agendados para hoje.</p>
                </div>
                <div class="input">
                    <i><img src="assets/calendar.svg" alt="Calendário" /></i>
                    <input type="date" id="date" name="date" required />
                </div>
            </header>
            <main>
                <section class="schedule-period">
                    <header>
                        <img src="assets/morning.svg" alt="Manhã" />
                        <h2>Manhã</h2>
                        <span>09h-12h</span>
                    </header>
                    <ul id="period-morning" class="period" role="list"></ul>
                </section>

                <section class="schedule-period">
                    <header>
                        <img src="assets/afternoon.svg" alt="Tarde" />
                        <h2>Manhã</h2>
                        <span>13h-18h</span>
                    </header>
                    <ul id="period-afternoon" class="period" role="list">
                        <li>
                            <strong>09:00</strong>
                            <span><strong>Thor&nbsp;</strong> / Fernanda Costa</span>
                            <span>Vacinação</span>
                            <button class="link">Remover agendamento</button>
                        </li>
                        <li>
                            <strong>09:00</strong>
                            <span><strong>Thor&nbsp;</strong> / Fernanda Costa</span>
                            <span>Vacinação</span>
                            <button class="link">Remover agendamento</button>
                        </li>
                    </ul>
                </section>

                <section class="schedule-period">
                    <header>
                        <img src="assets/night.svg" alt="Noite" />
                        <h2>Manhã</h2>
                        <span>19h-21h</span>
                    </header>
                    <ul id="period-night" class="period" role="list"></ul>
                </section>
            </main>
            <button class="addButton">
                <img src="assets/plus.svg " alt="" />
            </button>
        </div>
    </body>
</html>
